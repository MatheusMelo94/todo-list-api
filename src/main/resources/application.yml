spring:
  application:
    name: todo-list-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/todolist}

# Allowlist de CORS por origem (PDR-0003; security-conventions.md § CORS Default).
# NUNCA '*'. Origens separadas por virgula via env CORS_ALLOWED_ORIGINS;
# default aponta para o frontend de dev local.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Fixa o comportamento de erro do Spring (nao depender do default) — remedia F-0001
# (security-findings-001.md), per architecture-conventions.md § Error Handling
# (sem internals ao cliente) e § Logging (detalhe so no servidor). Config base;
# os profiles abaixo nao redeclaram server.error, portanto herdam estes valores.
server:
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

# Actuator restrito ao health endpoint (deploy em PaaS — Render health check).
# Expoe SOMENTE 'health'; nenhum endpoint sensivel (env, beans, mappings,
# heapdump) e publicado. show-details=never para nao vazar detalhes de
# infra a clientes anonimos (API sem auth — Non-Goal #1), per
# architecture-conventions.md § Error Handling ("sem internals ao cliente").
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/todolist}

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongo:27017/todolist}

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGODB_URI}
# PaaS (Render) injeta a porta de bind via env PORT; honra-la e obrigatorio
# para o health check / roteamento do Render funcionarem. Default 8080 mantem
# paridade com local/docker. Apenas o profile prod le PORT — local/docker
# herdam o default 8080 do servidor embutido (per devops-conventions.md
# § Dockerfile Baseline: "Port: from env var, defaults to 8080").
server:
  port: ${PORT:8080}
